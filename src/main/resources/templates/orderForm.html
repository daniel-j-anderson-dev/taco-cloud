<!DOCTYPE html>
<!-- use w3 1999 xhtml schema -->
<!-- use thymeleaf schema -->
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<!-- page metadata -->
<head>
    <!-- tab title -->
    <title>Taco Cloud</title>

    <!-- add style sheet -->
    <link rel="stylesheet" th:href="@{/styles.css}" />
</head>

<body>
    <form method="post" th:action="@{/orders}" th:object="${tacoOrder}">
        <!-- heading -->
        <h1>Order your taco creations!</h1>

        <!-- taco image -->
        <img th:src="@{/images/TacoCloud.jpg}" />

        <!-- list tacos in order -->
        <h3>Your tacos in this order:</h3>
        <a th:href="@{/design}" id="another">Design another taco</a>
        <br />
        <ul>
            <li th:each="taco : ${tacoOrder.tacos}">
                <span th:text="${taco.name}">TACO NAME PLACEHOLDER</span>
            </li>
        </ul>

        <!-- allow delivery info input -->
        <h3>Deliver my taco masterpieces to...</h3>
        <label for="deliveryName">Name: </label>
        <input type="text" th:field="*{deliveryName}" />
        <br />
        <br />
        Address
        <br />
        <label for="deliveryStreet">Street: </label>
        <input type="text" th:field="*{deliveryStreet}" />
        <br />
        <label for="deliveryCity">City: </label>
        <input type="text" th:field="*{deliveryCity}" />
        <br />
        <label for="deliveryState">State: </label>
        <input type="text" th:field="*{deliveryState}" />
        <br />
        <label for="deliveryZip">Zip: </label>
        <input type="text" th:field="*{deliveryZip}" />
        <br />

        <!-- allow payment info input -->
        <h3>Here's how I'll pay...</h3>
        <label for="creditCardNumber">Credit Card#: </label>
        <input type="text" th:field="*{creditCardNumber}" />
        <br /> 
        <label for="creditCardExpiration">Expiration MM/YY: </label>
        <input type="text" th:field="*{creditCardExpiration}" />
        <br />
        <label for="creditCardValidationValue">CVV: </label>
        <input type="text" th:field="*{creditCardValidationValue}" />
        <br />

        <!-- allow submitting input -->
        <input type="submit" value="Submit Order" />
    </form>
</body>

</html>
